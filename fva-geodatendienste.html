<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geodatendienste · FVA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"/>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    :root {
      /* FVA Brand */
      --green:       #006E60;
      --green-light: #6CBC83;
      --gray-light:  #DADADA;
      --border-soft: #EEF1F2;

      /* Map viewer */
      --forest:#1a3a2a;--pine:#2d5a3d;--fern:#3d7a52;--moss:#5a9468;
      --sage:#8ab89a;--mist:#c8dece;--cream:#f4f1eb;--paper:#faf8f4;
      --ink:#1a1a18;--mid:#5a5a56;
      --sw:320px;--hh:52px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;font-family:'PT Sans',sans-serif;background:var(--forest)}

    /* ── HEADER ──────────────────────────────────────────────── */
    #hdr{
      position:fixed;top:0;left:0;right:0;z-index:200;height:var(--hh);
      background:#fff;border-bottom:1px solid var(--border-soft);
      box-shadow:0 1px 8px rgba(0,110,96,.3);
      display:flex;align-items:center;gap:14px;padding:0 20px;
    }
    .header-logo{display:flex;align-items:center;flex-shrink:0;text-decoration:none;}
    .logo-img{height:32px;width:auto;display:block;}
    .logo-text{font-weight:700;font-size:15px;letter-spacing:.04em;color:#1F2A2E;}
    .logo-sub{font-size:11px;color:#1F2A2E;margin-top:1px;}
    .hdr-div{width:1px;height:28px;background:var(--gray-light);flex-shrink:0;}
    .page-title{font-size:16px;font-weight:400;color:var(--green);white-space:nowrap;flex-shrink:0;}
    #hcnt{font-size:.68rem;background:var(--green);color:#fff;
      padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
    .header-socials{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .header-socials a{display:flex;align-items:center;opacity:.7;transition:opacity .12s;}
    .header-socials a:hover{opacity:1;}
    .header-socials img{height:20px;width:20px;object-fit:contain;}

    /* ── SIDEBAR TOGGLE ──────────────────────────────────────── */
    #tbtn{
      position:fixed;top:calc(50% + var(--hh)/2);transform:translateY(-50%);
      left:var(--sw);z-index:300;
      width:12px;height:40px;padding:0;
      background:#fff;
      border:1px solid rgba(26,58,42,.14);border-left:none;
      border-radius:0 6px 6px 0;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:left .35s cubic-bezier(.4,0,.2,1);
      box-shadow:2px 0 6px rgba(0,0,0,.06);}
    #tbtn:hover{background:#f0f4f1;}
    #tbtn svg{transition:transform .35s;}
    body.cls #tbtn{left:0;}
    body.cls #tbtn svg{transform:rotate(180deg);}

    /* ── SIDEBAR ─────────────────────────────────────────────── */
    #sb{position:fixed;top:var(--hh);left:0;bottom:0;width:var(--sw);z-index:100;
      background:#fff;border-right:1px solid rgba(26,58,42,.14);
      display:flex;flex-direction:column;
      transition:transform .35s cubic-bezier(.4,0,.2,1);
      box-shadow:3px 0 20px rgba(0,0,0,.2)}
    body.cls #sb{transform:translateX(calc(-1 * var(--sw)))}
    #scr{flex:1;overflow-y:auto;padding:6px 0 24px;scrollbar-width:thin;scrollbar-color:var(--mist) transparent}
    #scr::-webkit-scrollbar{width:3px}
    #scr::-webkit-scrollbar-thumb{background:var(--mist)}

    /* ── SECTION ─────────────────────────────────────────────── */
    .sec{border-bottom:1px solid rgba(26,58,42,.07)}
    .shdr{display:flex;align-items:center;gap:8px;padding:9px 13px;cursor:pointer;user-select:none;transition:background .15s}
    .shdr:hover{background:rgba(90,148,104,.07)}
    .sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .stit{flex:1;font-size:.74rem;font-weight:700;color:var(--forest);line-height:1.25}
    .scnt{font-size:.6rem;color:var(--mid);background:var(--mist);border-radius:8px;padding:1px 5px}
    .sarr{width:13px;height:13px;transition:transform .25s;flex-shrink:0}
    .shdr.op .sarr{transform:rotate(90deg)}
    .llist{display:none;padding:2px 0 6px}
    .shdr.op+.llist{display:block}

    /* ── LAYER ITEM ──────────────────────────────────────────── */
    .lay{display:flex;align-items:center;gap:8px;padding:5px 13px 5px 26px;cursor:pointer;transition:background .15s;position:relative}
    .lay:hover{background:rgba(90,148,104,.07)}
    .lay.on{background:rgba(61,122,82,.09)}
    .lay.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--fern);border-radius:0 2px 2px 0}
    .lthumb{width:38px;height:27px;border-radius:3px;flex-shrink:0;object-fit:cover;
      border:1px solid rgba(0,0,0,.07);background:var(--mist)}
    .lname{flex:1;font-size:.69rem;color:var(--ink);line-height:1.3}

    /* ── TOGGLE SWITCH ───────────────────────────────────────── */
    .ltog{width:26px;height:15px;border-radius:8px;flex-shrink:0;background:var(--mist);
      border:none;cursor:pointer;position:relative;transition:background .2s}
    .ltog::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;
      border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
    .ltog.on{background:var(--fern)}
    .ltog.on::after{left:13px}

    /* ── 2D BUTTON ───────────────────────────────────────────── */
    .maplibregl-ctrl-2d-btn{
      width:29px;height:29px;border:none;background:none;cursor:pointer;
      font-size:.65rem;font-weight:700;color:#333;letter-spacing:.04em;
      display:flex;align-items:center;justify-content:center;}
    .maplibregl-ctrl-2d-btn:hover{background:rgba(0,0,0,.05)}

    /* ── MAP ─────────────────────────────────────────────────── */
    #map{position:fixed;top:var(--hh);left:0;right:0;bottom:0;}

/* ── ERROR PANEL ─────────────────────────────────────────── */
    #errpanel{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:400;
      background:#3a1a1a;color:#fde8e8;padding:10px 16px;border-radius:8px;
      font-size:.72rem;max-width:420px;line-height:1.5;
      border:1px solid rgba(255,100,100,.2);box-shadow:0 4px 20px rgba(0,0,0,.5);display:none}
    #errpanel .ec{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:4px}
    #errpanel .et{font-weight:700;font-size:.75rem}
    #errpanel .ex{cursor:pointer;opacity:.6;font-size:.9rem}
    #errpanel .ex:hover{opacity:1}
    #errpanel.show{display:block}

    /* ── TOAST ───────────────────────────────────────────────── */
    #toast{position:fixed;bottom:16px;right:16px;z-index:500;
      background:var(--forest);color:var(--cream);padding:8px 13px;border-radius:7px;
      font-size:.71rem;border:1px solid rgba(255,255,255,.1);
      box-shadow:0 4px 20px rgba(0,0,0,.4);
      transform:translateY(8px);opacity:0;transition:opacity .25s,transform .25s;
      pointer-events:none;max-width:240px;line-height:1.4}
    #toast.show{opacity:1;transform:translateY(0)}

    /* ── LEGEND ─────────────────────────────────────────────── */
    #legend{
      position:fixed;bottom:40px;right:8px;z-index:150;
      display:flex;flex-direction:column;gap:6px;
      max-height:calc(100vh - var(--hh) - 56px);
      overflow-y:auto;overflow-x:hidden;
      scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.2) transparent;
      pointer-events:none;
    }
    .leg-entry{
      background:rgba(26,42,36,.92);border:1px solid rgba(255,255,255,.15);
      border-radius:8px;padding:8px 10px;backdrop-filter:blur(6px);
      pointer-events:auto;max-width:220px;
    }
    .leg-title{
      font-size:.62rem;color:var(--mist);letter-spacing:.04em;
      margin-bottom:6px;display:flex;align-items:center;gap:5px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .leg-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
    .leg-img{display:block;max-width:200px;}
    .leg-noimg{font-size:.6rem;color:var(--sage);font-style:italic;}

    /* ── maplibre overrides ──────────────────────────────────── */
    .maplibregl-ctrl-attrib{font-size:.56rem!important}
    .maplibregl-ctrl-group{border-radius:7px!important;overflow:hidden}
  </style>
</head>

<nav id="sb"><div id="scr"></div></nav>

<div id="errpanel">

</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────
const SECTIONS = [
  { id:'waldf', title:'Waldfunktionen', color:'#3d7a52', layers:[
    { id:'l01', name:'Bodenschutzwald & Lawinenschutz',      wms:'WMS_FVA_Bodenschutzwald',                     lyr:'bodenschutzwald' },
    { id:'l02', name:'Erholungswald Stufen 1 und 2',         wms:'WMS_FVA_Erholungswald_Stufe1und2',            lyr:'erholungswald' },
    { id:'l03', name:'Gesetzlicher Erholungswald',           wms:'WMS_FVA_Gesetzlicher_Erholungswald',          lyr:'gesetzlicher_erholungswald' },
    { id:'l04', name:'Immissionsschutzwald',                 wms:'WMS_FVA_Immissionsschutzwald',                lyr:'immissionsschutzwald' },
    { id:'l05', name:'Klimaschutzwald',                      wms:'WMS_FVA_Klimaschutzwald',                     lyr:'klimaschutzwald' },
    { id:'l06', name:'Sichtschutzwald',                      wms:'WMS_FVA_Sichtschutzwald',                     lyr:'sichtschutzwald' },
    { id:'l07', name:'Schutzwald gg. Umwelteinwirkungen',    wms:'WMS_FVA_Gesetzlicher_Umweltschutzwald',       lyr:'umweltschutzwald' },
    { id:'l08', name:'Wasserschutzwald',                     wms:'WMS_FVA_Wasserschutzwald',                    lyr:'sonstiger_wasserschutzwald' },
  ]},
  { id:'waldb', title:'Waldbiotope', color:'#5a9468', layers:[
    { id:'l10', name:'Waldbiotope',                          wms:'WMS_FVA_Waldbiotope',                         lyr:'waldbiotope' },
  ]},
  { id:'stand', title:'Forstliche Standortskartierung', color:'#8a6a3a', layers:[
    { id:'l20', name:'Forstliche Standortskarte',            wms:'WMS_FVA_Forstliche_Standortskarte',           lyr:'kartierobjektuebersicht' },
    { id:'l21', name:'Regionale Gliederung',                 wms:'WMS_FVA_RegionaleGliederung',                 lyr:'regionale_zonalwaelder_klimahaupttyp' },
  ]},
  { id:'wild', title:'Wildtierökologie', color:'#7a5a2a', layers:[
    { id:'l30', name:'Aktionsplan Auerhuhn – Maßnahmenplan', wms:'WMS_FVA_Auerhuhn_Aktion_Massnahmenplan',      lyr:'Massnahmenplan_2023-202841109' },
    { id:'l31', name:'Windenergie und Auerhuhn',             wms:'WMS_FVA_Auerhuhn_Windenergie',                lyr:'Windkraft_und_Auerhuhn14260' },
    { id:'l32', name:'Auerhuhnrelevante Flächen',            wms:'WMS_FVA_AuerhuhnFlaechen',                    lyr:'prioritaere_flaechen' },
    { id:'l33', name:'Wildkatzennachweise',                  wms:'WMS_FVA_Wildkatze',                           lyr:'wildkatzennachweise' },
    { id:'l34', name:'Generalwildwegeplan',                  wms:'WMS_FVA_Generalwildwegeplan',                 lyr:'Wildtierkorridor_1000m' },
    { id:'l35', name:'Luchsnachweise',                       wms:'WMS_FVA_Luchsnachweise',                      lyr:'luchsnachweise_2016_2017' },
    { id:'l36', name:'Wolfsnachweise',                       wms:'WMS_FVA_Wolfsnachweise',                      lyr:'wolfsnachweise_2016_2017' },
    { id:'l37', name:'Auerhuhnverbreitung',                  wms:'WMS_FVA_Auerhuhnverbreitung',                 lyr:'auerhuhnverbreitungsgebiet_2023' },
    { id:'l38', name:'Rotwildgebiete',                       wms:'WMS_FVA_Rotwildgebiete',                      lyr:'rotwildgebiete_baden_wuerttemberg' },
    { id:'l39', name:'Wildruhegebiete',                      wms:'WMS_FVA_Wildruhegebiete',                     lyr:'wildschutzgebiete_und_wildruhegebiete' },
  ]},
  { id:'klima', title:'Klimafolgenforschung', color:'#2a5a8a', layers:[
    { id:'l40', name:'Bonität', wms:'WMS_FVA_Klima_Bonitaet', lyr:'ausgangsbonitaet_fichte_current',
      // current/1981_2010 → Ausgangsbonitaet; RCP → relative Veränderung
      lyrFn:(art,zeit)=>{
        const a4=['fichte','tanne','eiche','buche'];
        const a=a4.includes(art)?art:null; if(!a) return null;
        if(zeit==='current'||zeit==='1981_2010') return 'ausgangsbonitaet_'+a+'_current';
        return 'relative_bonitaetsveraenderung_'+a+'_'+zeit;
      }},
    { id:'l41', name:'Buchdruckergefährdung', wms:'WMS_FVA_Klima_Buchdruckergefaehrdung', lyr:'buchdruckerrisiko_1981_2010',
      // keine Baumart; current → 1981_2010
      lyrFn:(art,zeit)=>'buchdruckerrisiko_'+(zeit==='current'?'1981_2010':zeit) },
    { id:'l42', name:'Sturmwurfgefährdung', wms:'WMS_FVA_Klima_Sturm', lyr:'sturmschadensrisiko_real_fichte',
      // Baumarten in Kategorien zusammengefasst
      lyrFn:(art,zeit)=>{
        const m={fichte:'fichte',tanne:'tanne_douglasie',douglasie:'tanne_douglasie',
                 eiche:'buche_eiche',buche:'buche_eiche',waldkiefer:'kiefer_laerche',bergahorn:'andere_baumarten'};
        return 'sturmschadensrisiko_real_'+(m[art]||'fichte');
      }},
    { id:'l43', name:'Bodenwasserhaushalt', wms:'WMS_FVA_Klima_Wasserhaushalt', lyr:'relative_bodenwassersaettigung_fichte_1981_2010',
      // nur fichte/buche verfügbar; current → 1981_2010
      lyrFn:(art,zeit)=>{
        const a=['fichte','buche'].includes(art)?art:'fichte';
        return 'relative_bodenwassersaettigung_'+a+'_'+(zeit==='current'?'1981_2010':zeit);
      }},
    { id:'l44', name:'Artverbreitung', wms:'WMS_FVA_Klima_Artverbreitung', lyr:'artverbreitung_fichte_heute',
      // WMS nutzt "heute" statt "current" und andere Zeiträume (2041/2061)
      lyrFn:(art,zeit)=>{
        const a4=['fichte','tanne','eiche','buche'];
        const a=a4.includes(art)?art:null; if(!a) return null;
        const z={current:'heute','1981_2010':'heute',
                 rcp45_2021_2050:'rcp45_2041_2060',rcp45_2071_2100:'rcp45_2061_2080',
                 rcp85_2021_2050:'rcp85_2041_2060',rcp85_2071_2100:'rcp85_2061_2080'};
        return 'artverbreitung_'+a+'_'+(z[zeit]||'heute');
      }},
    { id:'l45', name:'Vulnerabilität', wms:'WMS_FVA_Klima_Vulnerabilitaet', lyr:'vulnerabilitaet_fichte',
      lyrFn:(art,zeit)=>{
        const a4=['fichte','tanne','eiche','buche'];
        return 'vulnerabilitaet_'+(a4.includes(art)?art:'gesamt');
      }},
    { id:'l46', name:'Baumarteneigung', wms:'WMS_FVA_Klima_Baumarteneignung_Klimawandel', lyr:'baumarteneignung_fichte_heute',
      // Gruppe A (fichte/tanne/buche): 2021_2050/2071_2100; Gruppe B (rest): 2041_2060/2061-2080
      lyrFn:(art,zeit)=>{
        const gA=['fichte','tanne','buche'];
        const zA={current:'heute','1981_2010':'heute',
                  rcp45_2021_2050:'rcp45_2021_2050',rcp45_2071_2100:'rcp45_2071_2100',
                  rcp85_2021_2050:'rcp85_2021_2050',rcp85_2071_2100:'rcp85_2071_2100'};
        const zB={current:'heute','1981_2010':'heute',
                  rcp45_2021_2050:'rcp45_2041_2060',rcp45_2071_2100:'rcp45_2061-2080',
                  rcp85_2021_2050:'rcp85_2041_2060',rcp85_2071_2100:'rcp85_2061-2080'};
        return 'baumarteneignung_'+art+'_'+((gA.includes(art)?zA:zB)[zeit]||'heute');
      }},
  ]},
  { id:'wind', title:'Potentialstudie Windenergie', color:'#5a6a8a', layers:[
    { id:'l50', name:'Windenergie 5,25 m/s – 100 m',        wms:'WMS_FVA_Windenergiepotential_Wald_525ms_100m', lyr:'windenergiepotential_wald_525ms_100m' },
    { id:'l51', name:'Windenergie 5,75 m/s – 100 m',        wms:'WMS_FVA_Windenergiepotential_Wald_575ms_100m', lyr:'windenergiepotential_wald_575ms_100m' },
  ]},
  { id:'fern', title:'Fernerkundung', color:'#2a6a6a', layers:[
    { id:'l60', name:'Baumbedeckung',                        wms:'WMS_FVA_Fernerkundung_Baumbedeckung',         lyr:'fern_baumlayer' },
    { id:'l61', name:'Laub-Nadelwaldkarte',                  wms:'WMS_FVA_Fernerkundung_Laub_Nadelwald',        lyr:'fern_laubnadelwald' },
    // l62 Lücken & Bestandeshöhentypen: WMS liefert GetMap nur für EPSG:25832, nicht 3857/4326 → nicht darstellbar
    { id:'l63', name:'Waldbedeckung',                        wms:'WMS_FVA_Fernerkundung_Waldbedeckung',         lyr:'fern_waldbedeckung' },
    { id:'l64', name:'Waldbestockung',                       wms:'WMS_FVA_Fernerkundung_Waldbestockung',        lyr:'fern_bestockungslayer' },
    { id:'l65', name:'Waldhöhenstrukturkarte',               wms:'WMS_FVA_Fernerkundung_Waldhoehenstruktur',    lyr:'fern_whsk' },
  ]},
];

const BASE = 'https://owsproxy.lgl-bw.de/owsproxy/ows/';
const state = {}, elems = {}, caps = {};
let activeCount = 0;
let selectedArt = 'fichte';
let selectedZeitraum = 'current';

// ─── 2D/3D TOGGLE CONTROL ─────────────────────────────────────────────────────
class Toggle2DControl {
  constructor(){ this._is3D = true; }
  onAdd(map){
    this._map = map;
    this._container = document.createElement('div');
    this._container.className = 'maplibregl-ctrl maplibregl-ctrl-group';
    this._btn = document.createElement('button');
    this._btn.type = 'button';
    this._btn.className = 'maplibregl-ctrl-2d-btn';
    this._btn.textContent = '2D';
    this._btn.title = 'In 2D-Ansicht wechseln';
    this._btn.onclick = () => this._toggle();
    this._container.appendChild(this._btn);
    return this._container;
  }
  onRemove(){ this._container.parentNode?.removeChild(this._container); }
  _toggle(){
    this._is3D = !this._is3D;
    if(this._is3D){
      this._map.setTerrain({ source:'demSource', exaggeration:1.5 });
      this._map.easeTo({ pitch:50 });
      this._btn.textContent = '2D';
      this._btn.title = 'In 2D-Ansicht wechseln';
    } else {
      this._map.setTerrain(null);
      this._map.easeTo({ pitch:0, bearing:0 });
      this._btn.textContent = '3D';
      this._btn.title = 'In 3D-Ansicht wechseln';
    }
  }
}

// ─── MAP ──────────────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  pitch: 50,
  bearing: -15,
  maxPitch: 85,
  center: [8.8, 48.5],
  zoom: 8,
  style: {
    version: 8,
    glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
    sources: {
      osm: {
        type: 'raster',
        tiles: [
          'https://a.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
          'https://b.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
        ],
        tileSize: 256,
        maxzoom: 19,
        attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors, Tiles by <a href="https://www.hotosm.org">HOT</a> | FVA BW | Terrain: Mapterhorn'
      },
      demSource: {
        type: 'raster-dem',
        url: 'https://tiles.mapterhorn.com/tilejson.json',
        tileSize: 512,
      }
    },
    layers: [
      { id:'osm', type:'raster', source:'osm' },
      {
        id:'hillshade', type:'hillshade', source:'demSource',
        paint: {
          'hillshade-shadow-color':'#3a2a1a',
          'hillshade-highlight-color':'#ffffff',
          'hillshade-accent-color':'#5a4a3a',
          'hillshade-exaggeration':0.5,
          'hillshade-illumination-direction':315,
        }
      }
    ],
    terrain: { source:'demSource', exaggeration:1.5 },
    sky: {
      'sky-color':'#87ceeb','sky-horizon-blend':0.4,
      'horizon-color':'#d4e8f0','horizon-fog-blend':0.4,
      'fog-color':'#c8dce8','fog-ground-blend':0.9,
    }
  }
});

map.addControl(new maplibregl.NavigationControl({ visualizePitch:true, showZoom:true, showCompass:true }), 'top-right');
map.addControl(new Toggle2DControl(), 'top-right');
map.addControl(new maplibregl.ScaleControl({ unit:'metric' }), 'bottom-left');

map.on('load', () => {
  buildSidebar();
});

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function buildSidebar(){
  const scr = document.getElementById('scr');

  SECTIONS.forEach((sec, si) => {
    const isKlima = sec.id === 'klima';
    const wrap = document.createElement('div'); wrap.className = 'sec';
    const hdr = document.createElement('div');
    hdr.className = 'shdr' + (sec.id==='fern'?' op':'');
    hdr.innerHTML =
      '<span class="sdot" style="background:'+sec.color+'"></span>'+
      '<span class="stit">'+sec.title+'</span>'+
      '<span class="scnt">'+sec.layers.length+'</span>'+
      '<svg class="sarr" viewBox="0 0 13 13" fill="none">'+
        '<path d="M4.5 1.5l4 4-4 4" stroke="'+sec.color+'" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>'+
      '</svg>';
    hdr.onclick = () => hdr.classList.toggle('op');
    const list = document.createElement('div'); list.className = 'llist';
    if(isKlima){
      const fr = document.createElement('div');
      fr.style.cssText = 'padding:5px 13px 6px 26px;display:flex;gap:8px;';
      fr.innerHTML = `
        <select style="flex:1;padding:4px 8px;border:1px solid #c8dece;border-radius:4px;font-size:.7rem;background:#fff;">
          <option value="fichte"${selectedArt==='fichte'?' selected':''}>Fichte</option>
          <option value="tanne"${selectedArt==='tanne'?' selected':''}>Tanne</option>
          <option value="eiche"${selectedArt==='eiche'?' selected':''}>Eiche</option>
          <option value="buche"${selectedArt==='buche'?' selected':''}>Buche</option>
          <option value="bergahorn"${selectedArt==='bergahorn'?' selected':''}>Bergahorn</option>
          <option value="douglasie"${selectedArt==='douglasie'?' selected':''}>Douglasie</option>
          <option value="waldkiefer"${selectedArt==='waldkiefer'?' selected':''}>Waldkiefer</option>
        </select>
        <select style="flex:1;padding:4px 8px;border:1px solid #c8dece;border-radius:4px;font-size:.7rem;background:#fff;">
          <option value="current"${selectedZeitraum==='current'?' selected':''}>Heute</option>
          <option value="1981_2010"${selectedZeitraum==='1981_2010'?' selected':''}>1981–2010</option>
          <option value="rcp45_2021_2050"${selectedZeitraum==='rcp45_2021_2050'?' selected':''}>RCP4.5 2021–2050</option>
          <option value="rcp45_2071_2100"${selectedZeitraum==='rcp45_2071_2100'?' selected':''}>RCP4.5 2071–2100</option>
          <option value="rcp85_2021_2050"${selectedZeitraum==='rcp85_2021_2050'?' selected':''}>RCP8.5 2021–2050</option>
          <option value="rcp85_2071_2100"${selectedZeitraum==='rcp85_2071_2100'?' selected':''}>RCP8.5 2071–2100</option>
        </select>
      `;
      const [artSel, zeitSel] = fr.querySelectorAll('select');
      artSel.onchange = e => { selectedArt = e.target.value; updateKlimaLayers(); };
      zeitSel.onchange = e => { selectedZeitraum = e.target.value; updateKlimaLayers(); };
      list.append(fr);
    }
    sec.layers.forEach(cfg => {
      state[cfg.id] = false;
      const item = document.createElement('div'); item.className = 'lay';
      const thumb = document.createElement('img'); thumb.className = 'lthumb'; thumb.alt = cfg.name;
      if(isKlima){
        thumb.style.background = sec.color + '28';
      } else {
        thumb.src = BASE+cfg.wms+'?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&FORMAT=image%2Fpng&TRANSPARENT=true'+
          '&LAYERS='+encodeURIComponent(cfg.lyr)+'&STYLES=&SRS=EPSG%3A4326&WIDTH=80&HEIGHT=56&BBOX=7.5,47.5,10.5,50.0';
        thumb.onerror = () => { thumb.style.background = sec.color+'28'; thumb.removeAttribute('src'); };
      }
      const name = document.createElement('span'); name.className = 'lname'; name.textContent = cfg.name;
      const tog = document.createElement('button'); tog.className = 'ltog';
      tog.onclick = e => { e.stopPropagation(); toggle(cfg, sec.color); };
      item.onclick = () => toggle(cfg, sec.color);
      elems[cfg.id] = { item, tog, thumb, name };
      item.append(thumb, name, tog);
      list.append(item);
    });
    wrap.append(hdr, list); scr.append(wrap);
  });

  updateKlimaLayers();
}

// ─── KLIMA FILTER UPDATE ──────────────────────────────────────────────────────
async function updateKlimaLayers(){
  const klimaSec = SECTIONS.find(s => s.id === 'klima');
  if(!klimaSec) return;
  const suffix = '(' + selectedArt + ', ' + (selectedZeitraum === 'current' ? 'heute' : selectedZeitraum.replace(/_/g,' ')) + ')';
  for(const cfg of klimaSec.layers){
    const resolved = cfg.lyrFn
      ? cfg.lyrFn(selectedArt, selectedZeitraum)
      : await getResolvedLayer(cfg.wms);
    if(!resolved) continue;
    cfg.lyr = resolved;
    const el = elems[cfg.id];
    if(el){
      el.name.textContent = cfg.name + ' ' + suffix;
      el.thumb.src = BASE+cfg.wms+'?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&FORMAT=image%2Fpng&TRANSPARENT=true'+
        '&LAYERS='+encodeURIComponent(resolved)+'&STYLES=&SRS=EPSG%3A4326&WIDTH=80&HEIGHT=56&BBOX=7.5,47.5,10.5,50.0';
      el.thumb.onerror = () => { el.thumb.style.background='#2a5a8a28'; el.thumb.removeAttribute('src'); };
    }
    if(state[cfg.id]){
      const srcId = 'src-'+cfg.id, layId = 'lay-'+cfg.id;
      if(map.getLayer(layId)) map.removeLayer(layId);
      if(map.getSource(srcId)) map.removeSource(srcId);
      const url = BASE+cfg.wms+
        '?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&FORMAT=image%2Fpng&TRANSPARENT=true'+
        '&LAYERS='+encodeURIComponent(resolved)+'&STYLES=&SRS=EPSG%3A4326&WIDTH=256&HEIGHT=256&BBOX={bbox-epsg-4326}';
      map.addSource(srcId, { type:'raster', tiles:[url], tileSize:256 });
      map.addLayer({ id:layId, type:'raster', source:srcId, paint:{'raster-opacity':0.85} });
      map.moveLayer(layId);
      updateLegendEntry(cfg.id, cfg.wms, resolved);
    }
  }
}

// ─── CAPABILITIES ─────────────────────────────────────────────────────────────
async function getCapabilities(wmsName){
  if(caps[wmsName]) return caps[wmsName];
  const resp = await fetch(BASE+wmsName+'?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetCapabilities');
  if(!resp.ok) throw new Error('HTTP '+resp.status);
  const txt = await resp.text();
  if(txt.includes('Host not in allowlist')) throw new Error('Host not in allowlist');
  const xml = new DOMParser().parseFromString(txt, 'text/xml');
  const layers = [...xml.querySelectorAll('Layer > Name')].map(n=>n.textContent.trim()).filter(Boolean);
  const crsList = [...xml.querySelectorAll('SRS,CRS')].map(n=>n.textContent.trim());
  return (caps[wmsName] = { layers, crsList });
}

async function getResolvedLayer(wmsName){
  try {
    const cap = await getCapabilities(wmsName);
    let candidates = cap.layers.filter(l =>
      l.includes(selectedArt) &&
      (selectedZeitraum === 'current' ? l.includes('current') : l.includes(selectedZeitraum))
    );
    if(!candidates.length) candidates = cap.layers.filter(l =>
      selectedZeitraum === 'current' ? l.includes('current') : l.includes(selectedZeitraum)
    );
    if(!candidates.length) candidates = cap.layers;
    return candidates[0] || cap.layers[0];
  } catch(e){
    console.warn('Capabilities failed for', wmsName, e.message);
    return null;
  }
}

// ─── TOGGLE LAYER ─────────────────────────────────────────────────────────────
async function toggle(cfg, color){
  const {item, tog} = elems[cfg.id];
  const isOn = state[cfg.id];
  const srcId = 'src-'+cfg.id, layId = 'lay-'+cfg.id;

  if(isOn){
    if(map.getLayer(layId)) map.removeLayer(layId);
    if(map.getSource(srcId)) map.removeSource(srcId);
    state[cfg.id] = false;
    item.classList.remove('on'); tog.classList.remove('on');
    removeLegendEntry(cfg.id);
    activeCount = Math.max(0, activeCount-1);
    updateHeader(); toast('Deaktiviert: '+cfg.name);
    return;
  }

  item.classList.add('on'); tog.classList.add('on');

  try {
    let resolvedLayer = cfg.lyr;
    let usedCRS = 'EPSG:4326';
    try {
      const capData = await getCapabilities(cfg.wms);
      if(!cfg.lyrFn){
        const match = capData.layers.find(l =>
          l.toLowerCase() === cfg.lyr.toLowerCase() ||
          l.toLowerCase().replace(/_/g,'').includes(cfg.lyr.toLowerCase().replace(/_/g,'').slice(0,8))
        );
        if(match) resolvedLayer = match;
      }
      if(capData.crsList.some(c=>c.includes('3857'))) usedCRS = 'EPSG:3857';
    } catch(e){ console.warn('Capabilities failed:', e.message); }

    const bbox = usedCRS==='EPSG:3857' ? '{bbox-epsg-3857}' : '{bbox-epsg-4326}';
    const srsParam = usedCRS==='EPSG:3857' ? 'SRS=EPSG%3A3857' : 'SRS=EPSG%3A4326';
    const url = BASE+cfg.wms+
      '?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap'+
      '&FORMAT=image%2Fpng&TRANSPARENT=true'+
      '&LAYERS='+encodeURIComponent(resolvedLayer)+'&STYLES='+
      '&'+srsParam+'&WIDTH=256&HEIGHT=256&BBOX='+bbox;

    map.addSource(srcId, { type:'raster', tiles:[url], tileSize:256 });
    map.addLayer({ id:layId, type:'raster', source:srcId, paint:{'raster-opacity':0.85} });
    map.moveLayer(layId);
    state[cfg.id] = true;
    activeCount++;
    updateHeader(); toast('Aktiviert: '+cfg.name);
    addLegendEntry(cfg, resolvedLayer, color);

  } catch(err){
    if(map.getLayer(layId)) map.removeLayer(layId);
    if(map.getSource(srcId)) map.removeSource(srcId);
    state[cfg.id]=false; item.classList.remove('on'); tog.classList.remove('on');
    activeCount=Math.max(0,activeCount-1);
    showErr(cfg.name, err.message);
    updateHeader(); toast('Fehler: '+cfg.name);
  }
}

// ─── LEGEND ───────────────────────────────────────────────────────────────────
function legendImgUrl(wmsName, layerName){
  return BASE+wmsName+'?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetLegendGraphic'+
    '&FORMAT=image%2Fpng&LAYER='+encodeURIComponent(layerName);
}
function addLegendEntry(cfg, resolvedLayer, color){
  removeLegendEntry(cfg.id);
  const entry = document.createElement('div');
  entry.className = 'leg-entry'; entry.id = 'leg-'+cfg.id;
  const title = document.createElement('div'); title.className = 'leg-title';
  title.innerHTML = '<span class="leg-dot" style="background:'+color+'"></span>'+cfg.name;
  const img = document.createElement('img'); img.className = 'leg-img';
  img.src = legendImgUrl(cfg.wms, resolvedLayer);
  img.onerror = () => {
    img.remove();
    const msg = document.createElement('div'); msg.className = 'leg-noimg';
    msg.textContent = 'Keine Legende verfügbar'; entry.append(msg);
  };
  entry.append(title, img);
  document.getElementById('legend').append(entry);
}
function removeLegendEntry(id){
  document.getElementById('leg-'+id)?.remove();
}
function updateLegendEntry(id, wmsName, resolvedLayer){
  const img = document.querySelector('#leg-'+id+' .leg-img');
  if(img) img.src = legendImgUrl(wmsName, resolvedLayer);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function showErr(name,msg){ document.getElementById('et').textContent='Fehler: '+name; document.getElementById('em').textContent=msg||'Unbekannter Fehler'; document.getElementById('errpanel').classList.add('show'); }
function closeErr(){ document.getElementById('errpanel').classList.remove('show'); }
function updateHeader(){
  document.getElementById('hcnt').textContent=activeCount+' aktiv';
}
let toastT;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2600); }
function toggleSB(){ document.body.classList.toggle('cls'); }
</script>
