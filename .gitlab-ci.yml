pages:
  stage: deploy
  script:
    - mkdir public
    - cp index.html public/
    - cp app.js public/
    - cp style.css public/
    - cp -r data public/ || true
    - cp -r www public/ || true
    - cp -r api public/ || true
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"